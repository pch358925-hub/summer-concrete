<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>서중 콘크리트 습윤양생 사진대지</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./config.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">현장 공유 사진대지</p>
          <h1>서중 콘크리트 습윤양생</h1>
        </div>
        <div class="topbar-actions">
          <button id="searchButton" class="icon-button" type="button" title="사진대지 검색" aria-controls="boardSearchBar" aria-expanded="false">
            <span class="button-icon" aria-hidden="true">⌕</span>
            <span>검색</span>
          </button>
          <button id="printButton" class="primary-button" type="button">
            <span class="button-icon" aria-hidden="true">⎙</span>
            <span>인쇄/PDF</span>
          </button>
        </div>
      </header>

      <main class="layout">
        <section class="board-list-section" aria-label="사진대지 목록">
          <div class="panel-heading">
            <div>
              <h2>사진대지 목록</h2>
            </div>
            <div class="list-tools">
              <div id="storageMeter" class="storage-meter" aria-label="저장 용량">
                <div class="storage-meter-row">
                  <span>용량</span>
                  <strong id="storageMeterText">확인 중</strong>
                </div>
                <div class="storage-meter-track">
                  <span id="storageMeterBar"></span>
                </div>
              </div>
            </div>
          </div>
          <div id="boardSearchBar" class="board-search-bar" hidden>
            <label class="board-search-label" aria-label="타설부위 검색">
              <span class="button-icon" aria-hidden="true">⌕</span>
              <input id="boardSearchInput" type="search" placeholder="타설부위 검색" autocomplete="off">
            </label>
            <button id="clearSearchButton" class="small-button" type="button">지움</button>
          </div>
          <div id="boardList" class="board-list"></div>
        </section>

        <section class="control-panel" aria-label="사진대지 정보">
          <div class="panel-heading">
            <div>
              <h2>사진대지 정보</h2>
              <p id="syncStatus">저장 상태를 확인하는 중입니다.</p>
            </div>
            <button id="newBoardButton" class="ghost-button" type="button" title="새 사진대지 만들기">
              <span class="button-icon" aria-hidden="true">+</span>
              <span>새 대지</span>
            </button>
          </div>

          <div class="field-grid">
            <label>
              <span>현장명</span>
              <input id="projectNameInput" type="text" value="세종천안 2공구 (주)한화">
            </label>
            <label>
              <span>타설부위</span>
              <input id="pourPartInput" type="text" placeholder="예: 금단교 A1(세종) 벽체 1단" autocomplete="off">
            </label>
            <label>
              <span>타설일</span>
              <div class="date-stepper">
                <button id="prevPourDateButton" class="date-step-button" type="button" title="타설일 하루 전">
                  <span aria-hidden="true">‹</span>
                </button>
                <input id="pourDateInput" type="date">
                <button id="nextPourDateButton" class="date-step-button" type="button" title="타설일 하루 후">
                  <span aria-hidden="true">›</span>
                </button>
              </div>
            </label>
          </div>

          <div class="summary-row">
            <div id="summaryList" class="summary-list" aria-label="5일 양생 등록 현황"></div>
          </div>
        </section>

        <section class="day-section" aria-label="일차별 사진 등록">
          <div class="section-title-row">
            <div>
              <h2>5일 습윤양생 사진</h2>
            </div>
          </div>
          <div id="dayGrid" class="day-grid"></div>
        </section>

        <section class="preview-section" aria-label="출력 미리보기">
          <div class="section-title-row">
            <div>
              <h2>출력 미리보기</h2>
            </div>
          </div>
          <div id="printArea" class="print-area"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
